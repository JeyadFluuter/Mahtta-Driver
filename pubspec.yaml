name: piaggio_driver
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  get: ^4.7.2
  google_maps_flutter: ^2.10.1
  lottie: ^3.3.1
  custom_refresh_indicator: ^4.0.1
  shimmer: ^3.0.0
  get_storage: ^2.1.1
  pinput: ^5.0.1
  image_picker: ^1.1.2
  location: ^8.0.0
  pusher_channels_flutter: ^2.5.0
  dotted_line: ^3.2.3
  infinite_scroll_pagination: ^5.1.0
  fl_chart: ^1.0.0
  #onesignal_flutter: ^5.3.3
  url_launcher: ^6.3.1
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_local_notifications: ^19.5.0
  firebase_core: ^4.3.0
  firebase_app_installations: ^0.4.0+5
  firebase_messaging: ^16.1.0
  path_provider: ^2.1.5
  dio: ^5.8.0
  intl: ^0.20.2

  



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  flutter_native_splash: ^2.4.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf


flutter_native_splash:
  color: "#F8F9FA"
  image: "assets/images/Splash.png"
  android: true
  ios: true
  fullscreen: true